name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

env:
  APP_NAME: ss14-url-patcher
  GO_VERSION: "1.23.x"

jobs:
  linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: "1"
      GOOS: linux
      GOARCH: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            pkg-config \
            libgl1-mesa-dev \
            xorg-dev \
            libxkbcommon-dev

      - name: Build
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "dist/${APP_NAME}-linux-amd64"

          go version
          gcc --version

          go mod download

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "dist/${APP_NAME}-linux-amd64/${APP_NAME}" \
            .

          chmod +x "dist/${APP_NAME}-linux-amd64/${APP_NAME}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          cd dist

          tar -czf "${APP_NAME}-linux-amd64.tar.gz" "${APP_NAME}-linux-amd64"
          sha256sum "${APP_NAME}-linux-amd64.tar.gz" > "${APP_NAME}-linux-amd64.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-url-patcher-linux-amd64
          path: |
            dist/ss14-url-patcher-linux-amd64.tar.gz
            dist/ss14-url-patcher-linux-amd64.tar.gz.sha256

  windows-amd64:
    name: Windows amd64
    runs-on: windows-latest

    env:
      CGO_ENABLED: "1"
      GOOS: windows
      GOARCH: amd64
      CC: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup MSYS2 MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${env:APP_NAME}-windows-amd64" | Out-Null

          go version
          gcc --version

          go mod download

          go build `
            -trimpath `
            -ldflags="-s -w -H windowsgui" `
            -o "dist/${env:APP_NAME}-windows-amd64/${env:APP_NAME}.exe" `
            .

      - name: Package
        shell: pwsh
        run: |
          Set-Location dist

          Compress-Archive `
            -Force `
            -Path "${env:APP_NAME}-windows-amd64" `
            -DestinationPath "${env:APP_NAME}-windows-amd64.zip"

          $hash = Get-FileHash "${env:APP_NAME}-windows-amd64.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${env:APP_NAME}-windows-amd64.zip" |
            Set-Content "${env:APP_NAME}-windows-amd64.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-url-patcher-windows-amd64
          path: |
            dist/ss14-url-patcher-windows-amd64.zip
            dist/ss14-url-patcher-windows-amd64.zip.sha256

  macos-amd64:
    name: macOS amd64
    runs-on: macos-15-intel

    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_DISPLAY_NAME="SS14 URL Patcher"
          BUNDLE_DIR="dist/${APP_NAME}-darwin-amd64/${APP_DISPLAY_NAME}.app"
          MACOS_DIR="${BUNDLE_DIR}/Contents/MacOS"
          RESOURCES_DIR="${BUNDLE_DIR}/Contents/Resources"

          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"

          go version
          clang --version

          go mod download

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${MACOS_DIR}/${APP_NAME}" \
            .

          chmod +x "${MACOS_DIR}/${APP_NAME}"

          cat > "${BUNDLE_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>club.ss220.ss14.urlpatcher</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          cd dist

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_NAME}-darwin-amd64/SS14 URL Patcher.app" \
            "${APP_NAME}-darwin-amd64.zip"

          shasum -a 256 "${APP_NAME}-darwin-amd64.zip" > "${APP_NAME}-darwin-amd64.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-url-patcher-darwin-amd64
          path: |
            dist/ss14-url-patcher-darwin-amd64.zip
            dist/ss14-url-patcher-darwin-amd64.zip.sha256

  macos-arm64:
    name: macOS arm64
    runs-on: macos-15

    env:
      CGO_ENABLED: "1"
      GOOS: darwin
      GOARCH: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_DISPLAY_NAME="SS14 URL Patcher"
          BUNDLE_DIR="dist/${APP_NAME}-darwin-arm64/${APP_DISPLAY_NAME}.app"
          MACOS_DIR="${BUNDLE_DIR}/Contents/MacOS"
          RESOURCES_DIR="${BUNDLE_DIR}/Contents/Resources"

          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"

          go version
          clang --version

          go mod download

          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${MACOS_DIR}/${APP_NAME}" \
            .

          chmod +x "${MACOS_DIR}/${APP_NAME}"

          cat > "${BUNDLE_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_DISPLAY_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>club.ss220.ss14.urlpatcher</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          cd dist

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_NAME}-darwin-arm64/SS14 URL Patcher.app" \
            "${APP_NAME}-darwin-arm64.zip"

          shasum -a 256 "${APP_NAME}-darwin-arm64.zip" > "${APP_NAME}-darwin-arm64.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ss14-url-patcher-darwin-arm64
          path: |
            dist/ss14-url-patcher-darwin-arm64.zip
            dist/ss14-url-patcher-darwin-arm64.zip.sha256